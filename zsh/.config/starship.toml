# Starship prompt — tuned for Noctalia (palette = "noctalia")
# Colors below the marker block are injected automatically by Noctalia.

palette = "noctalia"
add_newline = true
command_timeout = 500

format = """\
[╭─](subtext0)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
[╰─](subtext0)\
$character\
"""

[line_break]
disabled = false

[character]
success_symbol = "[❯](bold mauve)"
error_symbol = "[✗](bold red)"
vimcmd_symbol = "[V](bold lavender)"
vimcmd_replace_one_symbol = "[R](bold lavender)"

[username]
show_always = false
style_user = "bold text"
style_root = "bold red"
format = "[$user]($style)@"

[hostname]
ssh_only = true
style = "subtext1"
format = "[$hostname]($style) "
trim_at = ".local"

[directory]
style = "bold text"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "…/"
read_only = " 󰌾"
read_only_style = "red"
home_symbol = "~"
format = "in [$path]($style) "

[git_branch]
symbol = " "
style = "mauve"
format = "on [$symbol$branch(:$remote_branch)]($style) "

[git_status]
style = "subtext1"
format = "[$all_status$ahead_behind]($style) "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
modified = "*"
staged = "+"
conflicted = "!"
renamed = "»"
deleted = "✘"
stashed = "$"

[cmd_duration]
min_time = 2_000
format = " took [$duration]($style)"
style = "subtext0"

